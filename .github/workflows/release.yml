name: Release

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type (auto/major/minor/patch)'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - major
          - minor
          - patch

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and Release
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Bump version
        id: bump
        shell: bash
        run: |
          BUMP_TYPE="${{ github.event.inputs.bump_type }}"
          if [ -z "$BUMP_TYPE" ]; then
            BUMP_TYPE="auto"
          fi

          echo "Bumping version with type: $BUMP_TYPE"

          if [ "$BUMP_TYPE" = "auto" ]; then
            OUTPUT=$(python scripts/bump_version.py 2>&1)
          else
            OUTPUT=$(python scripts/bump_version.py --type $BUMP_TYPE 2>&1)
          fi

          EXIT_CODE=$?
          echo "$OUTPUT"

          if [ $EXIT_CODE -ne 0 ]; then
            echo "No version bump needed, skipping release"
            echo "skip_release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          NEW_VERSION=$(echo "$OUTPUT" | tail -n 1 | awk '{$1=$1};1')
          echo "New version: $NEW_VERSION"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "skip_release=false" >> "$GITHUB_OUTPUT"

      - name: Generate CHANGELOG
        if: steps.bump.outputs.skip_release != 'true'
        shell: bash
        run: |
          python scripts/generate_changelog.py --version ${{ steps.bump.outputs.version }}

      - name: Configure Git
        if: steps.bump.outputs.skip_release != 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit version bump
        if: steps.bump.outputs.skip_release != 'true'
        shell: bash
        run: |
          git add VERSION CHANGELOG.md
          git commit -m "chore: bump version to ${{ steps.bump.outputs.version }}"

      - name: Create tag
        if: steps.bump.outputs.skip_release != 'true'
        shell: bash
        run: |
          git tag v${{ steps.bump.outputs.version }}

      - name: Push changes
        if: steps.bump.outputs.skip_release != 'true'
        shell: bash
        run: |
          git push origin master
          git push origin v${{ steps.bump.outputs.version }}

      - name: Build EXE
        if: steps.bump.outputs.skip_release != 'true'
        working-directory: build
        shell: cmd
        run: build.bat

      - name: Verify EXE created
        if: steps.bump.outputs.skip_release != 'true'
        working-directory: build
        shell: bash
        run: |
          if [ ! -f "dist/zapret-manager-windows-x64.exe" ] && [ ! -f "dist/ZapretManager.exe" ]; then
            echo "EXE file not created"
            exit 1
          fi

      - name: Rename artifact
        if: steps.bump.outputs.skip_release != 'true'
        working-directory: build
        shell: bash
        run: |
          if [ -f "dist/ZapretManager.exe" ]; then
            cp dist/ZapretManager.exe dist/zapret-manager-windows-x64.exe
          fi
          echo "Created: zapret-manager-windows-x64.exe"

      - name: Generate SHA256
        if: steps.bump.outputs.skip_release != 'true'
        working-directory: build
        shell: bash
        run: |
          sha256sum dist/zapret-manager-windows-x64.exe > dist/zapret-manager-windows-x64.exe.sha256

      - name: Extract changelog for release
        if: steps.bump.outputs.skip_release != 'true'
        id: changelog
        shell: bash
        run: |
          if [ ! -s release_notes.md ]; then
            echo -e "## Changes\n\nSee CHANGELOG.md for details." > release_notes.md
          fi

      - name: Create GitHub Release
        if: steps.bump.outputs.skip_release != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.version }}
          name: Release v${{ steps.bump.outputs.version }}
          body_path: release_notes.md
          files: |
            build/dist/zapret-manager-windows-x64.exe
            build/dist/zapret-manager-windows-x64.exe.sha256
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to Artifact Server
        if: steps.bump.outputs.skip_release != 'true' && secrets.ARTIFACT_SERVER_API_KEY != ''
        continue-on-error: true
        shell: bash
        run: |
          python scripts/publish_artifact.py \
            --url "${{ secrets.ARTIFACT_SERVER_URL || 'https://artifact.devflux.ru' }}" \
            --api-key "${{ secrets.ARTIFACT_SERVER_API_KEY }}" \
            --version ${{ steps.bump.outputs.version }} \
            --product-version ${{ steps.bump.outputs.version }} \
            --channel stable \
            --file build/dist/zapret-manager-windows-x64.exe \
            --platform windows \
            --arch x64

