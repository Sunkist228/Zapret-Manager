name: Release

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type (auto/major/minor/patch)'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - major
          - minor
          - patch

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and Release
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Bump version
        id: bump
        run: |
          $bumpType = "${{ github.event.inputs.bump_type }}"
          if ([string]::IsNullOrWhiteSpace($bumpType)) {
            $bumpType = "auto"
          }

          Write-Host "Bumping version with type: $bumpType"

          $stdoutFile = New-TemporaryFile
          $stderrFile = New-TemporaryFile

          if ($bumpType -eq "auto") {
            python scripts/bump_version.py 1> $stdoutFile 2> $stderrFile
          } else {
            python scripts/bump_version.py --type $bumpType 1> $stdoutFile 2> $stderrFile
          }

          $exitCode = $LASTEXITCODE
          $stdout = Get-Content -Path $stdoutFile -ErrorAction SilentlyContinue
          $stderr = Get-Content -Path $stderrFile -ErrorAction SilentlyContinue
          $stderr | ForEach-Object { Write-Host $_ }
          $stdout | ForEach-Object { Write-Host $_ }

          if ($exitCode -ne 0) {
            Write-Host "No version bump needed, skipping release"
            "skip_release=true" >> $env:GITHUB_OUTPUT
            exit 0
          }

          $newVersion = ($stdout | Where-Object { $_ -match '^\d+\.\d+\.\d+([+-].+)?$' } | Select-Object -Last 1).Trim()
          if ([string]::IsNullOrWhiteSpace($newVersion)) {
            Write-Error "Could not parse bumped version from scripts/bump_version.py stdout"
            exit 1
          }

          Write-Host "New version: $newVersion"
          "version=$newVersion" >> $env:GITHUB_OUTPUT
          "skip_release=false" >> $env:GITHUB_OUTPUT

      - name: Generate CHANGELOG
        if: steps.bump.outputs.skip_release != 'true'
        run: |
          python scripts/generate_changelog.py --version "${{ steps.bump.outputs.version }}"

      - name: Configure Git
        if: steps.bump.outputs.skip_release != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit version bump
        if: steps.bump.outputs.skip_release != 'true'
        run: |
          git add VERSION CHANGELOG.md
          git commit -m "chore: bump version to ${{ steps.bump.outputs.version }}"

      - name: Create tag
        if: steps.bump.outputs.skip_release != 'true'
        run: |
          git tag "v${{ steps.bump.outputs.version }}"

      - name: Push changes
        if: steps.bump.outputs.skip_release != 'true'
        run: |
          git push origin master
          git push origin "v${{ steps.bump.outputs.version }}"

      - name: Build EXE
        if: steps.bump.outputs.skip_release != 'true'
        working-directory: build
        run: .\build.bat

      - name: Verify EXE created
        if: steps.bump.outputs.skip_release != 'true'
        run: |
          if (!(Test-Path "build\dist\ZapretManager.exe")) {
            Write-Error "EXE file not created: build\dist\ZapretManager.exe"
            exit 1
          }

          $env:PYTHONIOENCODING = "utf-8"
          $archiveList = pyi-archive_viewer build\dist\ZapretManager.exe -l
          if (!($archiveList | Select-String -SimpleMatch "resources\bin\tls_clienthello_www_google_com.bin")) {
            Write-Error "EXE archive is missing preset payload: resources\bin\tls_clienthello_www_google_com.bin"
            exit 1
          }

      - name: Rename artifact
        if: steps.bump.outputs.skip_release != 'true'
        run: |
          Copy-Item -LiteralPath "build\dist\ZapretManager.exe" -Destination "build\dist\zapret-manager-windows-x64.exe" -Force
          Write-Host "Created: build\dist\zapret-manager-windows-x64.exe"

      - name: Generate SHA256
        if: steps.bump.outputs.skip_release != 'true'
        run: |
          $file = "build\dist\zapret-manager-windows-x64.exe"
          $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $file).Hash.ToLowerInvariant()
          "$hash  zapret-manager-windows-x64.exe" | Set-Content -Encoding ascii "build\dist\zapret-manager-windows-x64.exe.sha256"

      - name: Extract changelog for release
        if: steps.bump.outputs.skip_release != 'true'
        id: changelog
        run: |
          $version = "${{ steps.bump.outputs.version }}"
          $content = Get-Content -Raw -Encoding UTF8 CHANGELOG.md
          $pattern = "(?ms)^## \[$([regex]::Escape($version))\].*?(?=^## \[|\z)"
          $match = [regex]::Match($content, $pattern)

          if ($match.Success) {
            $notes = ($match.Value -split "`r?`n" | Select-Object -Skip 1) -join "`n"
            $notes = $notes.Trim()
          } else {
            $notes = ""
          }

          if ([string]::IsNullOrWhiteSpace($notes)) {
            $notes = "## Changes`n`nSee CHANGELOG.md for details."
          }

          Set-Content -Encoding UTF8 -Path release_notes.md -Value $notes

      - name: Create GitHub Release
        if: steps.bump.outputs.skip_release != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.bump.outputs.version }}"
          name: "Release v${{ steps.bump.outputs.version }}"
          body_path: release_notes.md
          files: |
            build/dist/zapret-manager-windows-x64.exe
            build/dist/zapret-manager-windows-x64.exe.sha256
          draft: false
          prerelease: false
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to Artifact Server
        if: steps.bump.outputs.skip_release != 'true'
        continue-on-error: true
        env:
          ARTIFACT_API_KEY: ${{ secrets.ARTIFACT_SERVER_API_KEY }}
          ARTIFACT_URL: ${{ secrets.ARTIFACT_SERVER_URL }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:ARTIFACT_API_KEY)) {
            Write-Host "No artifact server API key provided, skipping publish."
            exit 0
          }

          $url = $env:ARTIFACT_URL
          if ([string]::IsNullOrWhiteSpace($url)) {
            $url = "https://artifact.devflux.ru"
          }

          python scripts/publish_artifact.py `
            --url "$url" `
            --api-key "$env:ARTIFACT_API_KEY" `
            --version "${{ steps.bump.outputs.version }}" `
            --product-version "${{ steps.bump.outputs.version }}" `
            --channel stable `
            --file build/dist/zapret-manager-windows-x64.exe `
            --platform windows `
            --arch x64
