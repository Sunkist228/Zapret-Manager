name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-version:
    name: Validate Version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check tag matches VERSION
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          TAG="${{ github.ref_name }}"
          EXPECTED_TAG="v${VERSION}"

          if [ "$TAG" != "$EXPECTED_TAG" ]; then
            echo "ERROR: Tag '$TAG' does not match VERSION file '$EXPECTED_TAG'"
            exit 1
          fi

          echo "✓ Tag matches VERSION: $TAG"

  build-windows-x64:
    name: Build Windows x64
    runs-on: windows-latest
    needs: validate-version
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE
        run: |
          cd build
          .\build.bat

      - name: Rename artifact
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          Move-Item "dist\ZapretManager.exe" "dist\zapret-manager-windows-x64.exe"
          Write-Host "Created: zapret-manager-windows-x64.exe"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: dist/zapret-manager-windows-x64.exe
          retention-days: 90

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [validate-version, build-windows-x64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Windows x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-x64
          path: artifacts/

      - name: Generate release notes
        id: release_notes
        run: |
          VERSION="${{ github.ref_name }}"

          # Extract changelog for this version
          if [ -f CHANGELOG.md ]; then
            awk "/^## \[${VERSION#v}\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md > release_notes.md
          fi

          # If no changelog entry, generate from commits
          if [ ! -s release_notes.md ]; then
            echo "## Changes" > release_notes.md
            git log --pretty=format:"- %s (%h)" $(git describe --tags --abbrev=0 HEAD^)..HEAD >> release_notes.md
          fi

          cat release_notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body_path: release_notes.md
          files: |
            artifacts/zapret-manager-windows-x64.exe
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
