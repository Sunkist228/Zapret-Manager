name: Release

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type (auto/major/minor/patch)'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - major
          - minor
          - patch

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and Release
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Bump version
        id: bump
        run: |
          $bumpType = "${{ github.event.inputs.bump_type }}"
          if ([string]::IsNullOrEmpty($bumpType)) {
            $bumpType = "auto"
          }

          Write-Host "Bumping version with type: $bumpType"

          if ($bumpType -eq "auto") {
            $output = python scripts/bump_version.py 2>&1
          } else {
            $output = python scripts/bump_version.py --type $bumpType 2>&1
          }

          $exitCode = $LASTEXITCODE
          Write-Host $output

          if ($exitCode -ne 0) {
            Write-Host "No version bump needed, skipping release"
            echo "skip_release=true" >> $env:GITHUB_OUTPUT
            exit 0
          }

          $newVersion = ($output -split "`n")[-1].Trim()
          Write-Host "New version: $newVersion"
          echo "version=$newVersion" >> $env:GITHUB_OUTPUT
          echo "skip_release=false" >> $env:GITHUB_OUTPUT

      - name: Generate CHANGELOG
        if: steps.bump.outputs.skip_release != 'true'
        run: |
          python scripts/generate_changelog.py --version ${{ steps.bump.outputs.version }}

      - name: Configure Git
        if: steps.bump.outputs.skip_release != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit version bump
        if: steps.bump.outputs.skip_release != 'true'
        run: |
          git add VERSION CHANGELOG.md
          git commit -m "chore: bump version to ${{ steps.bump.outputs.version }}"

      - name: Create tag
        if: steps.bump.outputs.skip_release != 'true'
        run: |
          git tag v${{ steps.bump.outputs.version }}

      - name: Push changes
        if: steps.bump.outputs.skip_release != 'true'
        run: |
          git push origin master
          git push origin v${{ steps.bump.outputs.version }}

      - name: Build EXE
        if: steps.bump.outputs.skip_release != 'true'
        working-directory: build
        run: .\build.bat

      - name: Verify EXE created
        if: steps.bump.outputs.skip_release != 'true'
        working-directory: build
        run: |
          if (!(Test-Path "dist\ZapretManager.exe")) {
            Write-Error "EXE file not created"
            exit 1
          }
          $size = (Get-Item "dist\ZapretManager.exe").Length / 1MB
          Write-Host "EXE size: $([math]::Round($size, 2)) MB"

      - name: Rename artifact
        if: steps.bump.outputs.skip_release != 'true'
        working-directory: build
        run: |
          Copy-Item "dist\ZapretManager.exe" "dist\zapret-manager-windows-x64.exe"
          Write-Host "Created: zapret-manager-windows-x64.exe"

      - name: Generate SHA256
        if: steps.bump.outputs.skip_release != 'true'
        working-directory: build
        run: |
          $hash = (Get-FileHash "dist\zapret-manager-windows-x64.exe" -Algorithm SHA256).Hash
          $hash.ToLower() | Out-File "dist\zapret-manager-windows-x64.exe.sha256" -NoNewline -Encoding ASCII
          Write-Host "SHA256: $hash"

      - name: Extract changelog for release
        if: steps.bump.outputs.skip_release != 'true'
        id: changelog
        run: |
          $version = "${{ steps.bump.outputs.version }}"
          $changelog = Get-Content CHANGELOG.md -Raw

          # Extract section for this version
          $pattern = "(?s)## \[$version\].*?(?=## \[|$)"
          if ($changelog -match $pattern) {
            $releaseNotes = $matches[0]
            $releaseNotes | Out-File -FilePath release_notes.md -Encoding UTF8
            Write-Host "Extracted release notes for version $version"
          } else {
            "## Changes`n`nSee CHANGELOG.md for details." | Out-File -FilePath release_notes.md -Encoding UTF8
          }

      - name: Create GitHub Release
        if: steps.bump.outputs.skip_release != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.version }}
          name: Release v${{ steps.bump.outputs.version }}
          body_path: release_notes.md
          files: |
            build/dist/zapret-manager-windows-x64.exe
            build/dist/zapret-manager-windows-x64.exe.sha256
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to Artifact Server
        if: steps.bump.outputs.skip_release != 'true' && secrets.ARTIFACT_SERVER_API_KEY != ''
        continue-on-error: true
        run: |
          python scripts/publish_artifact.py \
            --url "${{ secrets.ARTIFACT_SERVER_URL || 'https://artifact.devflux.ru' }}" \
            --api-key "${{ secrets.ARTIFACT_SERVER_API_KEY }}" \
            --version "${{ steps.bump.outputs.version }}" \
            --product-version "${{ steps.bump.outputs.version }}" \
            --channel stable \
            --file build/dist/zapret-manager-windows-x64.exe \
            --platform windows \
            --arch x64

